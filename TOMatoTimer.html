<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 25:00 - Focus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Orbitron:wght@900&family=VT323&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1c1c1c; --bg-deep:#111111; --accent:#d9502a;
  --acc-glow:rgba(217,80,42,0.25); --text:#ffffff; --dim:#555555; --border:#2e2e2e;
  --dig-fs:200px; --ms-fs:57px;
  --fc-w:132px; --fc-h:185px; --fc-fs:147px; --fc-gap:12px; --fc-dot:10px; --fc-r:7px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
header{background:var(--bg-deep);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{color:var(--accent);font-weight:700;font-size:14px}
.hdr-btn{background:var(--accent);color:#fff;border:none;padding:7px 18px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:opacity .15s}
.hdr-btn:hover{opacity:.85}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 0;gap:10px;flex-wrap:wrap;flex-shrink:0}
.mode-tabs{display:flex;gap:6px}
.mode-btn{background:transparent;border:1px solid #393939;color:#666;padding:7px 20px;cursor:pointer;font-size:12px;font-family:'Nunito Sans',sans-serif;font-weight:600;letter-spacing:.8px;text-transform:uppercase;transition:all .2s}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mode-btn:hover:not(.active){border-color:#666;color:#bbb}
.right-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.ctrl-sep{width:1px;height:20px;background:#2a2a2a}
.picker{display:flex;gap:5px;align-items:center}
.pk-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#3a3a3a;margin-right:3px;white-space:nowrap}
.pk-btn{background:transparent;border:1px solid #2a2a2a;color:#484848;padding:5px 11px;cursor:pointer;font-size:11px;font-weight:600;font-family:'Nunito Sans',sans-serif;letter-spacing:.5px;transition:all .2s}
.pk-btn.active{border-color:#555;color:#aaa;background:#242424}
.pk-btn:hover:not(.active){border-color:#444;color:#777}
#fbtn-block{font-family:'Nunito',sans-serif;font-weight:900;letter-spacing:-0.5px}
#fbtn-digital{font-family:'Orbitron',sans-serif;font-size:10px}
#fbtn-retro{font-family:'VT323',monospace;font-size:15px;letter-spacing:1px}
#fbtn-flip{font-family:'Nunito',sans-serif;font-weight:900}
#sbtn-S{font-size:10px;padding:5px 9px}
#sbtn-M{font-size:12px;padding:5px 9px}
#sbtn-L{font-size:13px;padding:5px 9px}
#sbtn-XL{font-size:14px;font-weight:700;padding:5px 9px}
.clock-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;min-height:0;overflow:hidden}
#regularDisplay{display:flex;align-items:flex-end}
.digits{font-family:'Nunito',sans-serif;font-weight:900;font-size:var(--dig-fs);line-height:.95;color:var(--text);letter-spacing:-2px;text-shadow:0 10px 40px rgba(0,0,0,.9);transition:font-family .3s,letter-spacing .3s,font-size .25s}
.colon{font-family:'Nunito',sans-serif;font-weight:900;font-size:var(--dig-fs);line-height:.95;color:var(--text);padding:0 5px;margin-bottom:10px;transition:font-family .3s,font-size .25s}
.colon.blinking{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.12}}
.millis{font-family:'Nunito',sans-serif;font-weight:900;font-size:var(--ms-fs);color:var(--dim);margin-bottom:12px;margin-left:10px;min-width:3ch;transition:font-family .3s,font-size .25s}
#flipDisplay{display:none;align-items:center;gap:var(--fc-gap)}
.flip-group{display:flex;gap:var(--fc-gap)}
.flip-digit{position:relative;width:var(--fc-w);height:var(--fc-h);perspective:700px;filter:drop-shadow(0 8px 28px rgba(0,0,0,.85));transition:width .25s,height .25s}
.fh{position:absolute;left:0;right:0;height:50%;overflow:hidden}
.fh.top{top:0;border-radius:var(--fc-r) var(--fc-r) 0 0;border-bottom:2px solid #0d0d0d;background:#272727}
.fh.bot{bottom:0;border-radius:0 0 var(--fc-r) var(--fc-r);background:#1e1e1e}
.fh.flap{z-index:3;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.fh.flap.top{transform-origin:center bottom}
.fh.flap.bot{transform-origin:center top;transform:rotateX(90deg)}
.fh .ft{font-family:'Nunito',sans-serif;font-weight:900;font-size:var(--fc-fs);color:#fff;position:absolute;left:0;right:0;height:200%;display:flex;align-items:center;justify-content:center;letter-spacing:-2px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.fh.top .ft{top:0}
.fh.bot .ft{top:-100%}
.flip-digit::before,.flip-digit::after{content:'';position:absolute;width:6px;height:6px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#444,#111);z-index:10;box-shadow:0 1px 2px rgba(0,0,0,.8);top:calc(50% - 3px)}
.flip-digit::before{left:5px}
.flip-digit::after{right:5px}
@keyframes fdFlipUp{from{transform:rotateX(0deg)}to{transform:rotateX(-90deg)}}
@keyframes fdFlipDown{from{transform:rotateX(90deg)}to{transform:rotateX(0deg)}}
.flip-colon{display:flex;flex-direction:column;align-items:center;justify-content:center;height:var(--fc-h);gap:0}
.flip-colon span{display:block;width:var(--fc-dot);height:var(--fc-dot);border-radius:50%;background:#fff;margin:calc(var(--fc-dot) * 0.6) 0;box-shadow:0 0 10px rgba(255,255,255,.3)}
.flip-colon.blinking span{animation:blink 1s step-end infinite}
.session-row{display:flex;align-items:center;gap:12px;margin-top:20px}
.session-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#3a3a3a}
.dots{display:flex;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;background:#2e2e2e;transition:background .3s,transform .2s}
.dot.filled{background:var(--accent);box-shadow:0 0 8px var(--acc-glow);transform:scale(1.15)}
.controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:22px 20px;flex-shrink:0}
.btn-main{background:var(--accent);border:none;color:white;padding:14px 72px;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:opacity .15s,transform .1s;box-shadow:0 4px 20px rgba(217,80,42,.3)}
.btn-main:hover{opacity:.88}
.btn-main:active{transform:scale(.97)}
.btn-icon{background:transparent;border:1px solid #3a3a3a;color:#666;width:46px;height:46px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-icon:hover{border-color:#666;color:#ccc}
.alarm-bar{background:var(--bg-deep);border-top:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:6px 20px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
.ab-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#3a3a3a;white-space:nowrap}
.ab-sep{width:1px;height:18px;background:#2a2a2a;flex-shrink:0}
.alarm-opt{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:#555;transition:color .2s;white-space:nowrap}
.alarm-opt:hover{color:#aaa}
.alarm-opt.on{color:#bbb}
.alarm-opt input[type=checkbox]{accent-color:var(--accent);cursor:pointer;width:13px;height:13px}
.yt-wrap{display:none;align-items:center;gap:6px}
.yt-wrap.vis{display:flex}
.yt-input{background:#1a1a1a;border:1px solid #383838;color:#aaa;padding:4px 10px;font-size:11px;font-family:'Nunito Sans',sans-serif;width:200px;outline:none}
.yt-input:focus{border-color:#555}
.preview-btn{color:var(--accent);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;background:transparent;border:none;font-family:'Nunito Sans',sans-serif;transition:opacity .15s;padding:0}
.preview-btn:hover{opacity:.7}
#flashOverlay{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:9999}
body.mode-short{--accent:#2a8a6e;--acc-glow:rgba(42,138,110,.25)}
body.mode-long{--accent:#2a5e8a;--acc-glow:rgba(42,94,138,.25)}
</style>
</head>
<body id="body">
<div id="flashOverlay"></div>
<header>
  <span class="logo">🍅 TOMatoTimer</span>
  <button class="hdr-btn" onclick="resetTimer()">NEW TIMER</button>
</header>
<div class="top-bar">
  <div class="mode-tabs">
    <button class="mode-btn active" onclick="setMode('work')"  id="btn-work">Focus</button>
    <button class="mode-btn"        onclick="setMode('short')" id="btn-short">Short Break</button>
    <button class="mode-btn"        onclick="setMode('long')"  id="btn-long">Long Break</button>
  </div>
  <div class="right-controls">
    <div class="picker">
      <span class="pk-label">Clock</span>
      <button class="pk-btn active" onclick="setStyle('block')"   id="fbtn-block">Block</button>
      <button class="pk-btn"        onclick="setStyle('digital')" id="fbtn-digital">Digital</button>
      <button class="pk-btn"        onclick="setStyle('retro')"   id="fbtn-retro">Retro</button>
      <button class="pk-btn"        onclick="setStyle('flip')"    id="fbtn-flip">&#9654; Flip</button>
    </div>
    <div class="ctrl-sep"></div>
    <div class="picker">
      <span class="pk-label">Size</span>
      <button class="pk-btn" onclick="setSize('S')"  id="sbtn-S">S</button>
      <button class="pk-btn" onclick="setSize('M')"  id="sbtn-M">M</button>
      <button class="pk-btn active" onclick="setSize('L')" id="sbtn-L">L</button>
      <button class="pk-btn" onclick="setSize('XL')" id="sbtn-XL">XL</button>
    </div>
  </div>
</div>
<div class="clock-area">
  <div id="regularDisplay">
    <span class="digits" id="dMin">25</span>
    <span class="colon"  id="colon">:</span>
    <span class="digits" id="dSec">00</span>
    <span class="millis" id="dMs">000</span>
  </div>
  <div id="flipDisplay">
    <div class="flip-group">
      <div class="flip-digit" id="fd-m0"></div>
      <div class="flip-digit" id="fd-m1"></div>
    </div>
    <div class="flip-colon" id="flipColon"><span></span><span></span></div>
    <div class="flip-group">
      <div class="flip-digit" id="fd-s0"></div>
      <div class="flip-digit" id="fd-s1"></div>
    </div>
  </div>
  <div class="session-row">
    <span class="session-label">Session</span>
    <div class="dots">
      <div class="dot" id="dot0"></div><div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div><div class="dot" id="dot3"></div>
    </div>
  </div>
</div>
<div class="controls">
  <button class="btn-icon" title="Skip" onclick="skipSession()">&#9658;&#9658;</button>
  <button class="btn-main" id="startBtn" onclick="toggleTimer()">START</button>
  <button class="btn-icon" title="Reset" onclick="resetTimer()">&#8635;</button>
</div>
<div class="alarm-bar">
  <span class="ab-label">Alarms</span>
  <div class="ab-sep"></div>
  <label class="alarm-opt on" id="lbl-beep"><input type="checkbox" id="chk-beep" checked onchange="syncOpts()">&#128276; Beep</label>
  <label class="alarm-opt on" id="lbl-notify"><input type="checkbox" id="chk-notify" checked onchange="syncOpts();reqNotifPerm()">&#128421; Notification</label>
  <label class="alarm-opt on" id="lbl-flash"><input type="checkbox" id="chk-flash" checked onchange="syncOpts()">&#9889; Flash</label>
  <label class="alarm-opt" id="lbl-youtube"><input type="checkbox" id="chk-youtube" onchange="syncOpts();toggleYtField()">&#9654; YouTube</label>
  <div class="yt-wrap" id="ytWrap">
    <span style="font-size:11px;color:#444">URL:</span>
    <input type="text" class="yt-input" id="ytUrl" placeholder="https://youtube.com/watch?v=..." value="https://www.youtube.com/watch?v=2yJgwwDcgV8">
  </div>
  <div class="ab-sep"></div>
  <button class="preview-btn" onclick="fireAlarm('Preview!')">&#9654; PREVIEW</button>
</div>
<script>
'use strict';
const MODES={work:{label:'Focus',sec:25*60,btn:'btn-work',cls:''},short:{label:'Short Break',sec:5*60,btn:'btn-short',cls:'mode-short'},long:{label:'Long Break',sec:15*60,btn:'btn-long',cls:'mode-long'}};
const CLOCK_STYLES={block:{ff:"'Nunito',sans-serif",ls:'-2px',flip:false},digital:{ff:"'Orbitron',sans-serif",ls:'-1px',flip:false},retro:{ff:"'VT323',monospace",ls:'5px',flip:false},flip:{ff:"'Nunito',sans-serif",ls:'-2px',flip:true}};
const SIZES={
  S: {digFs:'90px', msFs:'27px',fcW:'62px', fcH:'87px', fcFs:'69px', fcGap:'6px', fcDot:'6px'},
  M: {digFs:'140px',msFs:'41px',fcW:'93px', fcH:'130px',fcFs:'103px',fcGap:'9px', fcDot:'8px'},
  L: {digFs:'200px',msFs:'57px',fcW:'132px',fcH:'185px',fcFs:'147px',fcGap:'12px',fcDot:'10px'},
  XL:{digFs:'265px',msFs:'75px',fcW:'174px',fcH:'243px',fcFs:'193px',fcGap:'16px',fcDot:'13px'}
};
let mode='work',remainMs=25*60*1000,running=false,rafId=null,lastTs=null,donePoms=0,curStyle='block',curSize='L';
let opts={beep:true,notify:true,flash:true,youtube:false};

class FlipDigit{
  constructor(el){this.el=el;this.cur=null;this._t=null;this._init()}
  _init(){
    this.el.innerHTML=`<div class="fh top bg"><div class="ft"></div></div><div class="fh bot bg"><div class="ft"></div></div><div class="fh top flap"><div class="ft"></div></div><div class="fh bot flap"><div class="ft"></div></div>`;
    const h=this.el.querySelectorAll('.fh');
    this.bgTop=h[0].querySelector('.ft');this.bgBot=h[1].querySelector('.ft');
    this.fTop=h[2];this.fBot=h[3];
    this.fTopTxt=this.fTop.querySelector('.ft');this.fBotTxt=this.fBot.querySelector('.ft');
  }
  set(val){
    if(val===this.cur)return;
    const old=this.cur;this.cur=val;
    if(old===null){
      [this.bgTop,this.bgBot,this.fTopTxt,this.fBotTxt].forEach(e=>e.textContent=val);
      this.fTop.style.animation='none';this.fBot.style.animation='none';this.fBot.style.transform='rotateX(90deg)';return;
    }
    this.bgTop.textContent=val;this.bgBot.textContent=old;
    this.fTopTxt.textContent=old;this.fBotTxt.textContent=val;
    this.fTop.style.animation='none';this.fBot.style.animation='none';this.fBot.style.transform='rotateX(90deg)';
    void this.fTop.offsetWidth;
    this.fTop.style.animation='fdFlipUp 0.22s ease-in forwards';
    this.fBot.style.animation='fdFlipDown 0.22s ease-out 0.22s forwards';
    clearTimeout(this._t);this._t=setTimeout(()=>{this.bgBot.textContent=val},480);
  }
}

const fd={};
['m0','m1','s0','s1'].forEach(id=>{fd[id]=new FlipDigit(document.getElementById('fd-'+id));fd[id].set('0')});

function setSize(s){
  curSize=s;
  const sz=SIZES[s],css=document.documentElement.style;
  css.setProperty('--dig-fs',sz.digFs);css.setProperty('--ms-fs',sz.msFs);
  css.setProperty('--fc-w',sz.fcW);css.setProperty('--fc-h',sz.fcH);
  css.setProperty('--fc-fs',sz.fcFs);css.setProperty('--fc-gap',sz.fcGap);css.setProperty('--fc-dot',sz.fcDot);
  document.querySelectorAll('[id^="sbtn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('sbtn-'+s).classList.add('active');
  if(CLOCK_STYLES[curStyle].flip){['m0','m1','s0','s1'].forEach(id=>{fd[id].cur=null});renderDisplay()}
}

function setStyle(s){
  curStyle=s;const st=CLOCK_STYLES[s];
  document.querySelectorAll('.pk-btn[id^="fbtn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('fbtn-'+s).classList.add('active');
  if(st.flip){
    document.getElementById('regularDisplay').style.display='none';
    document.getElementById('flipDisplay').style.display='flex';
    ['m0','m1','s0','s1'].forEach(id=>{fd[id].cur=null});renderDisplay();
  }else{
    document.getElementById('regularDisplay').style.display='flex';
    document.getElementById('flipDisplay').style.display='none';
    ['dMin','dSec','colon','dMs'].forEach(id=>{
      const el=document.getElementById(id);el.style.fontFamily=st.ff;el.style.letterSpacing=st.ls;
    });
  }
}

function setMode(m,auto=false){
  if(running&&!auto)return;stop();mode=m;remainMs=MODES[m].sec*1000;
  Object.values(MODES).forEach(d=>document.getElementById(d.btn).classList.remove('active'));
  document.getElementById(MODES[m].btn).classList.add('active');
  document.getElementById('body').className=MODES[m].cls;
  document.getElementById('startBtn').textContent='START';setColonState(false);
  ['m0','m1','s0','s1'].forEach(id=>{fd[id].cur=null});renderDisplay();
}

function toggleTimer(){running?pause():start()}
function start(){running=true;lastTs=performance.now();document.getElementById('startBtn').textContent='PAUSE';setColonState(true);rafId=requestAnimationFrame(tick)}
function pause(){running=false;if(rafId)cancelAnimationFrame(rafId);document.getElementById('startBtn').textContent='RESUME';setColonState(false)}
function stop(){running=false;if(rafId)cancelAnimationFrame(rafId)}
function resetTimer(){stop();remainMs=MODES[mode].sec*1000;document.getElementById('startBtn').textContent='START';setColonState(false);['m0','m1','s0','s1'].forEach(id=>{fd[id].cur=null});renderDisplay()}
function skipSession(){stop();onComplete(true)}
function setColonState(b){document.getElementById('colon').classList.toggle('blinking',b);document.getElementById('flipColon').classList.toggle('blinking',b)}

function tick(ts){
  if(!running)return;
  remainMs=Math.max(0,remainMs-(ts-lastTs));lastTs=ts;renderDisplay();
  if(remainMs<=0){stop();onComplete(false);return}
  rafId=requestAnimationFrame(tick);
}

function onComplete(skipped){
  if(mode==='work'){donePoms++;updateDots();const next=donePoms%4===0?'long':'short';if(!skipped)fireAlarm(MODES[next].label+' time!');setTimeout(()=>setMode(next,true),600)}
  else{if(!skipped)fireAlarm('Focus time!');setTimeout(()=>setMode('work',true),600)}
}

function renderDisplay(){
  const totalSec=Math.ceil(remainMs/1000),m=Math.floor(totalSec/60),s=totalSec%60,ms=Math.floor(remainMs%1000);
  const mStr=String(m).padStart(2,'0'),sStr=String(s).padStart(2,'0');
  if(CLOCK_STYLES[curStyle].flip){fd.m0.set(mStr[0]);fd.m1.set(mStr[1]);fd.s0.set(sStr[0]);fd.s1.set(sStr[1])}
  else{document.getElementById('dMin').textContent=mStr;document.getElementById('dSec').textContent=sStr;document.getElementById('dMs').textContent=String(ms).padStart(3,'0')}
  const icon=mode==='work'?'&#127845;':'&#9749;';
  document.title=(mode==='work'?'🍅':'☕')+' '+mStr+':'+sStr+' \u2014 '+MODES[mode].label;
}

function updateDots(){
  const n=donePoms%4===0?4:donePoms%4;
  for(let i=0;i<4;i++)document.getElementById('dot'+i).classList.toggle('filled',i<n);
  if(donePoms%4===0)setTimeout(()=>{for(let i=0;i<4;i++)document.getElementById('dot'+i).classList.remove('filled')},2000);
}

function fireAlarm(msg){if(opts.beep)playBeep();if(opts.flash)doFlash();if(opts.notify)showNotif(msg);if(opts.youtube)launchYt()}
function playBeep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[880,660,880,1100].forEach((freq,i)=>{const osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type='sine';osc.frequency.value=freq;const t=ctx.currentTime+i*0.33;gain.gain.setValueAtTime(0.35,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.28);osc.start(t);osc.stop(t+0.3)})}catch(e){}}
function doFlash(){const el=document.getElementById('flashOverlay');let n=0;const go=()=>{el.style.opacity=n%2===0?'0.55':'0';if(++n<8)setTimeout(go,130)};go()}
function reqNotifPerm(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission()}
function showNotif(msg){if(!('Notification'in window))return;const send=()=>new Notification('🍅 Pomodoro',{body:msg,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍅</text></svg>'});if(Notification.permission==='granted')send();else if(Notification.permission!=='denied')Notification.requestPermission().then(p=>{if(p==='granted')send()})}
function launchYt(){window.open(document.getElementById('ytUrl').value.trim()||'https://www.youtube.com/watch?v=2yJgwwDcgV8','_blank')}
function syncOpts(){['beep','notify','flash','youtube'].forEach(k=>{opts[k]=document.getElementById('chk-'+k).checked;document.getElementById('lbl-'+k).classList.toggle('on',opts[k])})}
function toggleYtField(){document.getElementById('ytWrap').classList.toggle('vis',document.getElementById('chk-youtube').checked)}

renderDisplay();reqNotifPerm();
</script>
</body>
</html>
